name: CI Energy Pipeline

on:
  push:
    branches: [ main, develop, tests ]
    pull_request:
      branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      localstack:
        image: localstack/localstack:3.8.1
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyspark pyarrow>=15.0.0 great-expectations==0.18.19 pymongo boto3

      - name: Set up JDK 11 (Required for Spark)
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run Unit Tests
        run: pytest tests/test_unit.py

      - name: Run Integration Tests
        env:
          MONGO_URI: mongodb://localhost:27017/energy_db
          BUCKET_S3: s3a://raw-zone/weather-data/*.json
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        run: |
          pytest tests/test_integration.py
