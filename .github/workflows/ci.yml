name: CI Energy Pipeline Action

on:
  push:
    branches: [ main, develop, tests ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      localstack:
        image: localstack/localstack:3.8.1
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up JDK 17 (Required for modern Spark)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instalando delta-spark para suporte ao Delta Lake via Python
          pip install pytest pyspark==3.5.0 delta-spark==2.4.0 pyarrow>=15.0.0 \
                      great-expectations==0.18.19 pymongo boto3 awscli

      - name: Cache Spark JARs
        uses: actions/cache@v3
        with:
          path: ~/spark-jars
          key: spark-jars-hadoop-3.3.4-awsv1-delta-2.4.0-mongo-10.4.0

      - name: Download Spark JARs
        run: |
          mkdir -p ~/spark-jars
          # Hadoop AWS
          [ -f ~/spark-jars/hadoop-aws-3.3.4.jar ] || curl -fL -o ~/spark-jars/hadoop-aws-3.3.4.jar \
            https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar
          
          # AWS SDK Bundle v1 (Necessário para compatibilidade com Hadoop 3.3.x)
          [ -f ~/spark-jars/aws-java-sdk-bundle-1.12.262.jar ] || curl -fL -o ~/spark-jars/aws-java-sdk-bundle-1.12.262.jar \
            https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar
          
          # Mongo Spark Connector
          [ -f ~/spark-jars/mongo-spark-connector_2.12-10.4.0.jar ] || curl -fL -o ~/spark-jars/mongo-spark-connector_2.12-10.4.0.jar \
            https://repo1.maven.org/maven2/org/mongodb/spark/mongo-spark-connector_2.12/10.4.0/mongo-spark-connector_2.12-10.4.0.jar
          
          # Delta Lake Core & Storage
          [ -f ~/spark-jars/delta-core_2.12-2.4.0.jar ] || curl -fL -o ~/spark-jars/delta-core_2.12-2.4.0.jar \
            https://repo1.maven.org/maven2/io/delta/delta-core_2.12/2.4.0/delta-core_2.12-2.4.0.jar
          [ -f ~/spark-jars/delta-storage-2.4.0.jar ] || curl -fL -o ~/spark-jars/delta-storage-2.4.0.jar \
            https://repo1.maven.org/maven2/io/delta/delta-storage/2.4.0/delta-storage-2.4.0.jar

      - name: Wait for LocalStack and create S3 bucket
        run: |
          echo "Waiting for LocalStack..."
          for i in {1..30}; do
            curl -s http://localhost:4566/_localstack/health | grep '"s3": "available"' && break
            echo "Attempt $i: LocalStack not ready yet..."
            sleep 3
          done

          # Provisionamento da infra de teste
          aws --endpoint-url=http://localhost:4566 s3 mb s3://raw-zone --region us-east-1
          aws --endpoint-url=http://localhost:4566 s3 mb s3://lakeouse --region us-east-1

          # Criação do Mock Data para teste integrado
          echo '[{"park_id":"park-001","raw_payload":{"hourly":{"time":["2024-01-01T00:00"],"wind_speed_100m":[10.5]}}}]' \
            > /tmp/test-weather.json
          aws --endpoint-url=http://localhost:4566 s3 cp /tmp/test-weather.json \
            s3://raw-zone/weather-data/test-weather.json
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1

      - name: Run Unit Tests
        run: pytest tests/test_unit.py

      - name: Run Integration Tests
        run: pytest tests/test_integration.py -v
        env:
          MONGO_URI: mongodb://localhost:27017/energy_db
          BUCKET_S3: s3a://raw-zone/weather-data/*.json
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1